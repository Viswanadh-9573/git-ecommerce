name: MERN Ecommerce CI & Frontend Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write # Crucial: Allows the pipeline to write the frontend code to gh-pages branch

jobs:
  # JOB 1: Test and validate the backend so you know it works
  backend-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Root & Backend Dependencies
      run: |
        # Installs jest, supertest, express, mongoose, etc. from root package.json
        npm install --legacy-peer-deps

    - name: Verify Backend Integrity
      run: |
        if [ -f backend/server.js ]; then
          echo "Backend entry point verified."
        else
          echo "Error: backend/server.js missing!" && exit 1
        fi

    - name: Run Automated Backend Tests
      run: |
        npm test

  # JOB 2: Build the frontend and push it to GitHub Pages
  frontend-deploy:
    runs-on: ubuntu-latest
    needs: backend-validation # Frontend will ONLY deploy if the tests pass successfully!
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install --legacy-peer-deps

    - name: Build React App
      env:
        CI: false
        SKIP_PREFLIGHT_CHECK: true # Bypasses the root monorepo babel-jest dependency version crash
        NODE_OPTIONS: --openssl-legacy-provider # Fixes the ERR_OSSL_EVP_UNSUPPORTED hashing block
      run: |
        cd frontend
        npm run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: frontend/build 
        branch: gh-pages