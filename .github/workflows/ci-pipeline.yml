name: MERN Ecommerce CI & Frontend Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  security-events: write # Required for CodeQL SAST reporting

jobs:
  # JOB 1: Test and validate the backend
  backend-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Root & Backend Dependencies
      run: |
        npm install --legacy-peer-deps

    - name: Verify Backend Integrity
      run: |
        if [ -f backend/server.js ]; then
          echo "Backend entry point verified."
        else
          echo "Error: backend/server.js missing!" && exit 1
        fi

    - name: Run Automated Backend Tests
      run: |
        npm test

  # JOB 2: SAST (Static Security Analysis)
  sast-scan:
    runs-on: ubuntu-latest
    needs: backend-validation
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript-typescript'

    - name: Perform CodeQL Analysis
      uses: github/github-action/analyze@v3

  # JOB 3: DAST (Dynamic Security Analysis)
  dast-scan:
    runs-on: ubuntu-latest
    needs: backend-validation
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install & Start Backend for Scanning
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/test # Ensure your app can fallback or use a mock if DB isn't running
      run: |
        npm install --legacy-peer-deps
        npm start & # Starts the backend server in the background
        sleep 10 # Gives the server a few seconds to spin up completely

    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:5000' # Change to your actual backend port

  # JOB 4: Build the frontend and push it to GitHub Pages
  frontend-deploy:
    runs-on: ubuntu-latest
    # Frontend will ONLY deploy if tests, SAST, and DAST pass successfully!
    needs: [backend-validation, sast-scan, dast-scan] 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install --legacy-peer-deps

    - name: Build React App
      env:
        CI: false
        SKIP_PREFLIGHT_CHECK: true 
        NODE_OPTIONS: --openssl-legacy-provider 
      run: |
        cd frontend
        npm run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: frontend/build 
        branch: gh-pages