name: MERN Ecommerce CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies (frontend)
        working-directory: frontend
        run: npm ci

      - name: Build (frontend)
        working-directory: frontend
        run: npm run build

  backend-smoke:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies (root)
        run: npm ci

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if mongo --host localhost --port 27017 --eval "db.adminCommand('ping')" >/dev/null 2>&1; then
              echo "MongoDB is up"
              exit 0
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done
          echo "MongoDB did not become ready in time" >&2
          exit 1

      - name: Backend smoke test (start)
        env:
          MONGO_URI: mongodb://localhost:27017/ecommerce
          JWT_SECRET: test_secret_key_12345
          NODE_ENV: test
        run: |
          # backend does not expose a separate build step; ensure the server can boot
          timeout 20s node backend/server.js

