name: MERN Ecommerce CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16' # Matches the 2021/2022 dependency ecosystem better

    - name: Install Root Dependencies
      run: |
        npm install --legacy-peer-deps

    - name: Install Frontend Dependencies & Build
      env:
        CI: false # Ensures warnings do not break your build step
      run: |
        # Using the project's built-in structural design to install and build frontend
        cd frontend
        npm install --legacy-peer-deps
        npm run build --if-present

    - name: Verify Backend Entry Point
      run: |
        # Validates that your main file exists where package.json claims it is
        if [ -f backend/server.js ]; then
          echo "Backend entry point verified successfully."
        else
          echo "Error: backend/server.js not found!" && exit 1
        fi